name: Build kushi-sp-v2 only

on:
  push:
    branches:
      - ci/build-kushi

permissions:
  contents: read

jobs:
  build:
    name: Build kushi-sp-v2
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py kushi-sp-v2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_kushi-sp-v2
          path: build/merged-binary.bin
          if-no-files-found: error
